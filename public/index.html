<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oh My Browser</title>
<meta name="description" content="MCP-native browser infrastructure for AI agents and agent platforms.">
<link rel="canonical" href="https://omb.org.cn/">
<script>
  // Client-side accept-language redirect. Falls through to /en when JS disabled
  // (see the <noscript> below).
  (function () {
    try {
      var lang = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
      var target = /^zh/i.test(lang) ? '/zh-CN/' : '/en/';
      window.location.replace(target);
    } catch (_e) {
      window.location.replace('/en/');
    }
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=/en/">
</noscript>
</head>
<body>
<p>Redirecting — if this takes more than a second, go to <a href="/en/">/en/</a> or <a href="/zh-CN/">/zh-CN/</a>.</p>
</body>
</html>
